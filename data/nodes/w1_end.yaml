---
Things To Do Before You Leave World One:
  Metadata:
    next-node: galuf_castle
    previous-nodes: ['manticore']
  Generic:
    - "Before you leave World 1, make sure you have the following..."
    - "Sufficient healing items to take on the Big Bridge Gilgamesh fight. There's a shop after that in Regole, and you can get infinite Tents (VERY slowly) from the Paos before the Bridge, but there's no way to restock healing items before the fight."
    - "Lix sells everything but Phoenix Downs for half off, and you can't get back there after W1."
    - "Speaking of, buy a couple Phoenix Downs. You'll be really embarrassed if you have none and the one in the chest before Tyrannosaurus misses."
    - "The Elven Mantle from the basement of Walse Castle, if you want it."
    - "If you're doing a Fifth Job run and not revealing it early, go get Alluring Air and Romeo's Ballad, Shiva and Ramuh, Toad and Mini, and buy out all the magic shops for level 1-3 magics, because all of that is not present in W2."
  Bard:
    - "Romeo's Ballad and Alluring Air. They're permanently missable! (And also two of the most useful songs.)"
  INTERSECTION Berserker Freelancer:
    - "As many Death Sickles as you need from Crescent Island. They don't show up again until Fork Tower."
  Chemist:
    - "A stockpile of Turtle Shells to get you through until you can farm them again after Drakenvale."
    - "The maximum number of Dark Matter you may want is 6. (That's one for every boss vulnerable to Death Potion in W2.) You can't farm more until early in W3."
    - "Prototype is vulnerable to Berserk, but you can't set Blind on it without Dragon Fangs, which you don't have. Just Succubus Kiss it to death, which is likely faster than snapping rods."
  Beastmaster:
    - "You may want to catch a few more Sand Bears to plow through Bridgeamesh."
  Ninja:
    - "Enough Scrolls and Shuriken to get you to Quelb. In practice, this is a few Thunder Scrolls for most of the Big Bridge, a few non-Thunder Scrolls for Neo Garula, and a few Shuriken for Gilgamesh."
  Blue-Mage:
    - "Much of what you missed in W1 you can't learn right now, but don't miss out on Level 5 Death and Aera. Possibly also Flame Thrower, Vampire, Flash, Aqua Breath, Self-Destruct, and/or Missile."
    - "Dark Spark and Death Claw show up again very soon, but you should have them anyway. If you didn't get Dark Spark, get it now."
    - "If you don't have a better offensive option for Melusine, you probably want to pick up extra Flame Rods now and hold onto them until W3. This is just a time-saver, nothing crucial."
  Beastmaster:
    - "The Blitz Whip in Jachol Cave is gone for a long time. If you want it, get it now."
  INTERSECTION Red-Mage Black-Mage:
    - "Get Toad now or wait until Phantom Village. It's not especially useful, but it's your call."
  INTERSECTION White-Mage Red-Mage:
    - "Get Mini from the Catapult. It's not essential, but it's a long time before you can get it again and it's useful for weird things like Berserkers on the Crystals."
  Summoner:
    - "Get Shiva and Ramuh now or wait until literally just before Twintania."
