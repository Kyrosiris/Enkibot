  Generic:
  - "Gilgamesh has 8,888 HP and mixes up !Attack, Missile, and Death Claw. He is Heavy, but not immune to instant death."
  - "Gilgamesh will summon Enkidu when he has 4,000 HP or less remaining. Enkidu has 4,000 HP and uses various blue magic, including the completely infuriating White Wind. Enkidu is neither Heavy nor immune to instant death."
