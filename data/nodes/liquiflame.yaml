Liquid Flame:
  Metadata:
    next-node: karnak_500
    previous-nodes: ['fireship']
  Generic:
    - "3,000 HP. Transitions randomly between three forms (50/50 to become either form it is not currently in) when hit. All three forms absorb wind and fire."
    - "The Human Form has single and multi target attacks. It counters all hits with Blaze."
    - "The Hand Form has single target attacks that can paralyze. It counters all hits with Fira, but runs out of MP after three casts. Absorbs fire, nullifies ALL other elements including ice."
    - "The Tornado Form casts Fira on itself to heal, but runs out of MP after five casts. It counters all hits with Magnet, moving the attacker to the front row."
    - "Since the forms' MP are tracked separately and Tornado Form doesn't actually attack, just sitting there until it runs out of MP is likely a good idea."
  INTERSECTION Ranger Freelancer:
    - "The Tornado Form specifically drops a Fire Bow. It's helpful in the next dungon and not buyable until the Crescent shop later."
  INTERSECTION White-Mage Red-Mage:
    - "Liquid Flame can be confused, leading it to do nothing except attack itself. Doesn't stop form changes, but gives you lots of time to heal."
  White-Mage:
    - "Honestly, this is probably the best way for you to kill it. It doesn't form change on hitting itself, it doesn't heal itself because it's attacking itself, and so on. It's tedious, but it works."
  Break-Rods:
    - "Frost Rods will kill in two snaps. Don't use them on the Hand form!"
  Time-Mage:
    - "Gravity works on both the Human and Tornado forms. Not the Hand form! That can replace the first Frost Rod snap."
  Monk:
    - "Fewer, bigger hits are better against counter-heavy enemies, so !Focus is good here."
  Knight:
    - "Fewer, bigger hits are better against counter-heavy enemies, so Two-Handed is good here."
  Mystic-Knight:
    - "Blizzara Sword will inflict massive damage. Make sure you have a way to damage Hand Form to turn it back to a Form weak to ice."
    - "You can unequip your weapon and re-equip it through the Item menu to remove your !Spellblade effect without using your turn. If you don't have a better way to hit the Hand, that will suffice."
  Berserker:
    - "Consider going into the fight with your Berserker dead to control phase changes, at least until you run Tornado out of MP so it can't heal."
  Blue-Mage:
    - "All three forms absorb wind, so don't use Aero. Just break rods."
